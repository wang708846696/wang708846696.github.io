t">// we are called from JNI_OnLoad, so got to release LocalRef to avoid leaking</span></span><br><span class="line">    (*env)-&gt;DeleteLocalRef(env, buildVersion);</span><br><span class="line"></span><br><span class="line">    <span class="comment">// Query available memory size from a non-static public function</span></span><br><span class="line">    <span class="comment">// we need use an instance of JniHelper class to call JNI</span></span><br><span class="line">    jmethodID memFunc = (*env)-&gt;GetMethodID(env, g_ctx.jniHelperClz,</span><br><span class="line">                                            <span class="string">"getRuntimeMemorySize"</span>, <span class="string">"()J"</span>);</span><br><span class="line">    <span class="keyword">if</span> (!memFunc) &#123;</span><br><span class="line">        LOGE(<span class="string">"Failed to retrieve getRuntimeMemorySize() methodID @ line %d"</span>,</span><br><span class="line">             __LINE__);</span><br><span class="line">        <span class="keyword">return</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="comment">//调用java的Runtime.getRuntime().freeMemory()方法</span></span><br><span class="line">    jlong result = (*env)-&gt;CallLongMethod(env, instance, memFunc);</span><br><span class="line">    LOGI(<span class="string">"Runtime free memory size: %"</span> PRId64, result);</span><br><span class="line">    (<span class="keyword">void</span>)result;  <span class="comment">// silence the compiler warning</span></span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

d_mutex_init(&amp;g_ctx.lock, <span class="literal">NULL</span>);</span><br><span class="line"></span><br><span class="line">    jclass clz = (*env)-&gt;GetObjectClass(env, instance);</span><br><span class="line">    <span class="comment">//将clzz存储全局</span></span><br><span class="line">    g_ctx.mainActivityClz = (*env)-&gt;NewGlobalRef(env, clz);</span><br><span class="line">    <span class="comment">//将obj存储全局</span></span><br><span class="line">    g_ctx.mainActivityObj = (*env)-&gt;NewGlobalRef(env, instance);</span><br><span class="line">	<span class="comment">//创建一个线程，执行的任务在UpdateTicks方法中</span></span><br><span class="line">    <span class="keyword">int</span> result  = pthread_create( &amp;threadInfo_, &amp;threadAttr_, UpdateTicks, &amp;g_ctx);</span><br><span class="line">    assert(result == <span class="number">0</span>);</span><br><span class="line"></span><br><span class="line">    pthread_attr_destroy(&amp;threadAttr_);</span><br><span class="line"></span><br><span class="line">    (<span class="keyword">void</span>)result;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

pan><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment"> * Main working thread function. From a pthread,</span></span><br><span class="line"><span class="comment"> *     calling back to MainActivity::updateTimer() to display ticks on UI</span></span><br><span class="line"><span class="comment"> *     calling back to JniHelper::updateStatus(String msg) for msg</span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"><span class="function"><span class="keyword">void</span>*  <span class="title">UpdateTicks</span><span class="params">(<span class="keyword">void</span>* context)</span> </span>&#123;</span><br><span class="line">    TickContext *pctx = (TickContext*) context;</span><br><span class="line">    JavaVM *javaVM = pctx-&gt;javaVM;</span><br><span class="line">    JNIEnv *env;</span><br><span class="line">    jint res = (*javaVM)-&gt;GetEnv(javaVM, (<span class="keyword">void</span>**)&amp;env, JNI_VERSION_1_6);</span><br><span class="line">    <span class="keyword">if</span> (res != JNI_OK) &#123;</span><br><span class="line">        <span class="comment">//绑定当前线程</span></span><br><span class="line">        res = (*javaVM)-&gt;AttachCurrentThread(javaVM, &amp;env, <span class="literal">NULL</span>);</span><br><span class="line">        <span class="keyword">if</span> (JNI_OK != res) &#123;</span><br><span class="line">            LOGE(<span class="string">"Failed to AttachCurrentThread, ErrorCode = %d"</span>, res);</span><br><span class="line">            <span class="keyword">return</span> <span class="literal">NULL</span>;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">	<span class="comment">//得到updateStatus方法</span></span><br><span class="line">    jmethodID statusId = (*env)-&gt;GetMethodID(env, pctx-&gt;jniHelperClz,</span><br><span class="line">                                             <span class="string">"updateStatus"</span>,</span><br><span class="line">                                             <span class="string">"(Ljava/lang/String;)V"</span>);</span><br><span class="line">    <span class="comment">//打印java层的log</span></span><br><span class="line">    sendJavaMsg(env, pctx-&gt;jniHelperObj, statusId,</span><br><span class="line">                <span class="string">"TickerThread status: initializing..."</span>);</span><br><span class="line"></span><br><span class="line">    <span class="comment">// get mainActivity updateTimer function</span></span><br><span class="line">    <span class="comment">//得到updateTimer</span></span><br><span class="line">    jmethodID timerId = (*env)-&gt;GetMethodID(env, pctx-&gt;mainActivityClz,</span><br><span class="line">                                            <span class="string">"updateTimer"</span>, <span class="string">"()V"</span>);</span><br><span class="line">	<span class="comment">//定义四个时间结构体的对象</span></span><br><span class="line">    <span class="class"><span class="keyword">struct</span> <span class="title">timeval</span> <span class="title">beginTime</span>, <span class="title">curTime</span>, <span class="title">usedTime</span>, <span class="title">leftTime</span>;</span></span><br><span class="line">    <span class="keyword">const</span> <span class="class"><span class="keyword">struct</span> <span class="title">timeval</span> <span class="title">kOneSecond</span> = &#123;</span></span><br><span class="line">            (<span class="keyword">__kernel_time_t</span>)<span class="number">1</span>,</span><br><span class="line">            (<span class="keyword">__kernel_suseconds_t</span>) <span class="number">0</span></span><br><span class="line">    &#125;;</span><br><span class="line"></span><br><span class="line">    sendJavaMsg(env, pctx-&gt;jniHelperObj, statusId,</span><br><span class="line">                <span class="string">"TickerThread status: start ticking ..."</span>);</span><br><span class="line">    <span class="keyword">while</span>(<span class="number">1</span>) &#123;</span><br><span class="line">        <span class="comment">//得到当前时间</span></span><br><span class="line">        gettimeofday(&amp;beginTime, <span class="literal">NULL</span>);</span><br><span class="line">        <span class="comment">//加锁</span></span><br><span class="line">        pthread_mutex_lock(&amp;pctx-&gt;lock);</span><br><span class="line">        <span class="keyword">int</span> done = pctx-&gt;done;</span><br><span class="line">        <span class="keyword">if</span> (pctx-&gt;done) &#123;</span><br><span class="line">            pctx-&gt;done = <span class="number">0</span>;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="comment">//解锁</span></span><br><span class="line">        pthread_mutex_unlock(&amp;pctx-&gt;lock);</span><br><span class="line">        <span class="keyword">if</span> (done) &#123;</span><br><span class="line">            <span class="keyword">break</span>;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="comment">//得到MainActivity的OBJ</span></span><br><span class="line">        (*env)-&gt;CallVoidMethod(env, pctx-&gt;mainActivityObj, timerId);</span><br><span class="line">		<span class="comment">//得到当前时间</span></span><br><span class="line">        gettimeofday(&amp;curTime, <span class="literal">NULL</span>);</span><br><span class="line">        <span class="comment">//用于时间休眠</span></span><br><span class="line">        timersub(&amp;curTime, &amp;beginTime, &amp;usedTime);</span><br><span class="line">        timersub(&amp;kOneSecond, &amp;usedTime, &amp;leftTime);</span><br><span class="line">        <span class="class"><span class="keyword">struct</span> <span class="title">timespec</span> <span class="title">sleepTime</span>;</span></span><br><span class="line">        sleepTime.tv_sec = leftTime.tv_sec;</span><br><span class="line">        sleepTime.tv_nsec = leftTime.tv_usec * <span class="number">1000</span>;</span><br><span class="line"></span><br><span class="line">        <span class="keyword">if</span> (sleepTime.tv_sec &lt;= <span class="number">1</span>) &#123;</span><br><span class="line">            nanosleep(&amp;sleepTime, <span class="literal">NULL</span>);</span><br><span class="line">        &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">            sendJavaMsg(env, pctx-&gt;jniHelperObj, statusId,</span><br><span class="line">                        <span class="string">"TickerThread error: processing too long!"</span>);</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    sendJavaMsg(env, pctx-&gt;jniHelperObj, statusId,</span><br><span class="line">                <span class="string">"TickerThread status: ticking stopped"</span>);</span><br><span class="line">    (*javaVM)-&gt;DetachCurrentThread(javaVM);</span><br><span class="line">    <span class="keyword">return</span> context;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
